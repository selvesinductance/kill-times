<!DOCTYPE html>
<html lang="ja">
<head>

<style>

.dt{width:12px;height:12px;border-radius:50%}
#ttl{margin-left:7px;font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#scrwrap{position:relative;flex:1;display:flex;min-height:0}
#scr{flex:1;overflow-y:auto;padding:14px 16px;cursor:text;

#fx{position:absolute;inset:0;pointer-events:none;

#out{white-space:pre-wrap;word-break:break-all}
.kw{color:#c678dd}.fn{color:#61afef}.str{color:#98c379}.num{color:#d19a66}
.com{color:#7f848e;font-style:italic}.type{color:#e5c07b}.prop{color:#e06c75}
.ok{color:#3fb950}.warn{color:#d29922}.err{color:#f85149}.pr{color:#56d364}
#cur{display:inline-block;width:.55em;height:1.05em;background:#9da5b0;
 vertical-align:text-bottom;animation:bl 1s steps(1) infinite}
@keyframes bl{50%{opacity:0}}
#hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
 text-align:center;color:#c9d1d9;font-size:clamp(13px,2vw,15px);padding:24px;line-height:2;
 background:rgba(13,17,23,.55);opacity:0;transition:opacity .5s;pointer-events:none}

 background:var(--bar);border-top:1px solid var(--bd);font-size:11px;color:var(--mut);
 flex:none;user-select:none}
#acc{margin-left:auto;white-space:nowrap}
#acc.on{color:#3fb950}
.tbtn{background:none;border:1px solid #30363d;color:var(--mut);font:inherit;font-size:11px;
 padding:2px 9px;border-radius:5px;cursor:pointer;white-space:nowrap}
.tbtn:hover{color:#c9d1d9;border-color:#6e7681}
.tbtn:focus-visible{outline:2px solid #58a6ff;outline-offset:1px}
#mob{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;border:0;padding:0;font-size:16px}
@media(prefers-reduced-motion:reduce){#cur{animation:none}}
</style>
</head>
