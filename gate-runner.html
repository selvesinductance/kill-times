<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🚪 ゲートランナー — 数式ゲートで動物を増やせ！</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  #app {
    min-height: 100vh; box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center;
    font-family: system-ui, sans-serif; padding: 16px 12px 32px;
    transition: background 0.6s; overflow: hidden;
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  /* 揺れは残すが振幅を小さく・ゆっくりに（光の明滅は一切なし） */
  @keyframes bigshake {
    0% { transform: translate(0,0) rotate(0); } 25% { transform: translate(-4px,2px) rotate(-0.3deg); }
    50% { transform: translate(3px,-3px) rotate(0.25deg); } 75% { transform: translate(-2px,-2px) rotate(-0.2deg); }
    100% { transform: translate(0,0) rotate(0); }
  }
  /* ゆっくりした揺らぎ（旧グリッチの代替。色の点滅なし） */
  @keyframes wobble {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    25% { transform: translate(-2px,1px) rotate(-1.2deg); }
    50% { transform: translate(2px,-1px) rotate(1deg); }
    75% { transform: translate(-1px,-1px) rotate(-0.8deg); }
  }
  /* 穏やかな呼吸（不透明度は 0.75〜1 の範囲・2秒周期） */
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.75; } }
  @keyframes floatchar {
    from { opacity: 0; transform: scale(0.3) rotate(0deg); }
    30% { opacity: 1; }
    to { opacity: 0.2; transform: scale(1.5) rotate(18deg); }
  }
  /* トロイの木馬が左からトコトコ入ってくる */
  @keyframes trot {
    from { transform: translateX(-46vw) rotate(0deg); }
    40% { transform: translateX(-24vw) rotate(-4deg); }
    70% { transform: translateX(-8vw) rotate(4deg); }
    to { transform: translateX(0) rotate(0deg); }
  }
  /* 異常事態の赤フレーム: 2秒周期でゆっくり脈動（点滅ではない） */
  @keyframes framepulse {
    0%,100% { opacity: 0.65; box-shadow: inset 0 0 26px rgba(211,47,47,0.35); }
    50% { opacity: 1; box-shadow: inset 0 0 52px rgba(211,47,47,0.55); }
  }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: inherit; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-iteration-count: 1 !important; animation-duration: 0.01s !important; transition: none !important; }
  }
</style>
<div id="app"></div>
<script>
"use strict";
(function () {
// ============================================================
//  🚪 ゲートランナー — 数式ゲートで動物を増やせ！（Vanilla JS 単一ファイル版）
//  ・数式は全64種類（三角関数・対数・微積分・ビット演算入り）
//  ・|n| が 2³² を超えると「オーバーフロー」→ ブルースクリーン強制終了
//  ・0除算 / 定義域エラー(√負, log負 など)→ トロイの木馬に侵入され強制終了
//  ※ 光過敏対策: 高速な明滅・色反転フラッシュは不使用
// ============================================================

const LIMIT = 4294967296; // 2^32
const STAGE_COUNT = 12;
const START_N = 5;
const HALF_LIMIT = 2147483648; // 2^31
const ANIMALS = ["🐶","🐱","🐰","🐻","🐼","🐨","🐯","🦊","🐸","🐵","🐔","🐧","🐷","🦁","🐮","🐹"];
const SPEEDS = [
  { key: "slow", label: "ゆったり", time: 10, emoji: "🐢" },
  { key: "normal", label: "ふつう", time: 6, emoji: "🐇" },
  { key: "oni", label: "鬼", time: 3, emoji: "👹" },
];
const D = Math.PI / 180;

// ===== 数学ヘルパー =====
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }
function fib(k) { let a = 0, b = 1; for (let i = 0; i < k; i++) { [a, b] = [b, a + b]; } return a; }
function revDigits(n) {
  const s = Math.sign(n) || 1;
  return s * Number(String(Math.abs(Math.trunc(n))).split("").reverse().join(""));
}
function digitSum(n) { return String(Math.abs(Math.trunc(n))).split("").reduce((s, c) => s + +c, 0); }
function factorial(n) {
  if (n < 0) return NaN;
  if (n > 20) return Infinity;
  let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
}

// ===== 64種類のゲート数式 =====
// den: 分母を返す関数（0なら「0除算」でクラッシュ）
const OPS = [
  // --- 四則演算 (14) ---
  { label: "n×2", fn: n => n * 2 },
  { label: "n×3", fn: n => n * 3 },
  { label: "n×10", fn: n => n * 10 },
  { label: "n+7", fn: n => n + 7 },
  { label: "n+100", fn: n => n + 100 },
  { label: "n−8", fn: n => n - 8 },
  { label: "n−100", fn: n => n - 100 },
  { label: "n÷2", fn: n => n / 2 },
  { label: "n÷3", fn: n => n / 3 },
  { label: "n÷10", fn: n => n / 10 },
  { label: "2n−10", fn: n => 2 * n - 10 },
  { label: "100−n", fn: n => 100 - n },
  { label: "(n+20)÷2", fn: n => (n + 20) / 2 },
  { label: "3(n−5)", fn: n => 3 * (n - 5) },
  // --- 累乗・ルート (10) ---
  { label: "n²", fn: n => n * n },
  { label: "n³", fn: n => n * n * n },
  { label: "√n", fn: n => Math.sqrt(n) },
  { label: "∛n", fn: n => Math.cbrt(n) },
  { label: "n√n", fn: n => n * Math.sqrt(n) },
  { label: "2ⁿ", fn: n => Math.pow(2, n) },
  { label: "1.1ⁿ", fn: n => Math.pow(1.1, n) },
  { label: "n⁰", fn: n => Math.pow(n, 0) },
  { label: "√(n−100)", fn: n => Math.sqrt(n - 100) },
  { label: "n!", fn: n => factorial(n) },
  // --- 剰余・割り算トラップ (8) ---
  { label: "n%7", fn: n => n % 7 },
  { label: "n%100", fn: n => n % 100 },
  { label: "n+n%10", fn: n => n + (n % 10) },
  { label: "n×(n%2)", fn: n => n * (n % 2) },
  { label: "n÷(n%5)", fn: n => n / (n % 5), den: n => n % 5 },
  { label: "n÷(n−10)", fn: n => n / (n - 10), den: n => n - 10 },
  { label: "n²÷(n%9)", fn: n => (n * n) / (n % 9), den: n => n % 9 },
  { label: "n÷(n%3+1)", fn: n => n / ((n % 3) + 1), den: n => (n % 3) + 1 },
  // --- 三角関数（度数法）(8) ---
  { label: "n·sin n°", fn: n => n * Math.sin(n * D) },
  { label: "n·cos n°", fn: n => n * Math.cos(n * D) },
  { label: "n+100sin n°", fn: n => n + 100 * Math.sin(n * D) },
  { label: "n·|tan n°|", fn: n => n * Math.abs(Math.tan(n * D)) },
  { label: "n·sin 90°", fn: n => n * Math.sin(90 * D) },
  { label: "n(1+cos180°)", fn: n => n * (1 + Math.cos(180 * D)) },
  { label: "100·atan n", fn: n => 100 * Math.atan(n) },
  { label: "√(n²+n²)", fn: n => Math.hypot(n, n) },
  // --- 対数・指数 (8) ---
  { label: "log₂ n", fn: n => (n > 0 ? Math.log2(n) : NaN) },
  { label: "log₁₀ n", fn: n => (n > 0 ? Math.log10(n) : NaN) },
  { label: "n+ln n", fn: n => (n > 0 ? n + Math.log(n) : NaN) },
  { label: "n·ln n", fn: n => (n > 0 ? n * Math.log(n) : NaN) },
  { label: "n·log₁₀ n", fn: n => (n > 0 ? n * Math.log10(n) : NaN) },
  { label: "100·ln(n−50)", fn: n => (n > 50 ? 100 * Math.log(n - 50) : NaN) },
  { label: "eⁿ", fn: n => Math.exp(n) },
  { label: "n+e²", fn: n => n + Math.E * Math.E },
  // --- 微分・積分 (8) ---
  { label: "d/dn[n²]", fn: n => 2 * n },
  { label: "d/dn[n³]", fn: n => 3 * n * n },
  { label: "d/dn[7n]", fn: () => 7 },
  { label: "d²/dn²[n³]", fn: n => 6 * n },
  { label: "∫₀ⁿ x dx", fn: n => (n * n) / 2 },
  { label: "∫₀ⁿ x² dx", fn: n => (n * n * n) / 3 },
  { label: "∫₀ⁿ dx", fn: n => n },
  { label: "∫₁ⁿ dx/x", fn: n => (n >= 1 ? Math.log(n) : NaN) },
  // --- ビット・数論・その他 (8) ---
  { label: "n⊕255", fn: n => { if (n < 0) return NaN; const low = n % 256; return n - low + (255 - low); } },
  { label: "n≫2", fn: n => n / 4 },
  { label: "rev(n)", fn: n => revDigits(n) },
  { label: "Σ桁(n)", fn: n => digitSum(n) },
  { label: "gcd(n,360)", fn: n => (n === 0 ? 360 : gcd(n, 360)) },
  { label: "fib(n%20)", fn: n => fib(((n % 20) + 20) % 20) },
  { label: "|n−1000|", fn: n => Math.abs(n - 1000) },
  { label: "⌊πn⌋", fn: n => Math.PI * n },
];

// ===== ゲート評価 =====
// {type:"div0"} | {type:"nan"} | {type:"overflow", sign} | {type:"ok", value}
function evalOp(op, n) {
  if (op.den && op.den(n) === 0) return { type: "div0" };
  const r = op.fn(n);
  if (Number.isNaN(r)) return { type: "nan" };
  if (!Number.isFinite(r) || Math.abs(r) >= LIMIT) {
    return { type: "overflow", sign: r > 0 ? 1 : -1 };
  }
  return { type: "ok", value: Math.floor(r) };
}

// ===== ステージのゲートペア生成 =====
// 保証: 片方は必ず「減少」(または罠)、もう片方は必ず「±0か増加」(またはオーバーフロー餌)
function makeGates(n, avoid, stageIdx) {
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const evals = OPS.filter(op => !avoid.includes(op.label)).map(op => ({ op, res: evalOp(op, n) }));

  // 負のオーバーフローも「確実に減少する」選択肢として扱う（選ぶと爆発エンド）
  const downs = evals.filter(e =>
    (e.res.type === "ok" && e.res.value < n) ||
    (e.res.type === "overflow" && e.res.sign < 0)
  );
  const ups = evals.filter(e =>
    (e.res.type === "ok" && e.res.value >= n) ||
    (e.res.type === "overflow" && e.res.sign > 0)
  );
  const traps = evals.filter(e => e.res.type === "div0" || e.res.type === "nan");

  let down = downs.length ? pick(downs) : { op: { label: "n−10", fn: x => x - 10 }, res: { type: "ok", value: n - 10 } };

  // 増加側: オーバーフロー餌は約25%に抑える（nが大きいと餌だらけになるので）
  const okUps = ups.filter(e => e.res.type === "ok");
  const baitUps = ups.filter(e => e.res.type === "overflow");
  let up;
  if (okUps.length && baitUps.length) up = Math.random() < 0.25 ? pick(baitUps) : pick(okUps);
  else if (ups.length) up = pick(ups);
  else up = { op: { label: "n+10", fn: x => x + 10 }, res: { type: "ok", value: n + 10 } };

  // 「どっちを選んでも即死」は理不尽なので、両方クラッシュ系なら安全な方に差し替える
  if (down.res.type === "overflow" && up.res.type === "overflow") {
    const safeUps = ups.filter(e => e.res.type === "ok");
    if (safeUps.length) up = pick(safeUps);
    else {
      const safeDowns = downs.filter(e => e.res.type === "ok");
      if (safeDowns.length) down = pick(safeDowns);
    }
  }

  // ステージ3以降、たまに「減少側」が罠（0除算・定義域エラー）にすり替わる
  // ただし増加側がオーバーフロー餌のときは罠を入れない（両方即死は理不尽なので）
  const upIsBait = up.res.type === "overflow";
  if (!upIsBait && stageIdx >= 2 && traps.length && Math.random() < 0.3) {
    down = pick(traps);
  }

  return Math.random() < 0.5 ? [down.op, up.op] : [up.op, down.op];
}

// 時間切れのとき「悪い方」を選ぶ（クラッシュ > より小さい値）
function pickWorse(pair, n) {
  const score = op => {
    const r = evalOp(op, n);
    return r.type !== "ok" ? -Infinity : r.value;
  };
  const [a, b] = pair.map(score);
  if (a === b) return pair[Math.random() < 0.5 ? 0 : 1];
  return a < b ? pair[0] : pair[1];
}

// ===== 表示ヘルパー =====
function fmt(n) { return n.toLocaleString("ja-JP"); }
function jpUnit(n) {
  const a = Math.abs(n);
  if (a >= 1e8) return (n / 1e8).toFixed(a >= 1e10 ? 0 : 1) + "億";
  if (a >= 1e4) return (n / 1e4).toFixed(a >= 1e6 ? 0 : 1) + "万";
  return null;
}
function rankOf(n) {
  if (n >= 100000000) return ["🌌", "宇宙級レジェンド"];
  if (n >= 1000000) return ["👑", "ミリオン王"];
  if (n >= 100000) return ["💎", "ダイヤモンド"];
  if (n >= 10000) return ["🥇", "ゴールド"];
  if (n >= 1000) return ["🥈", "シルバー"];
  if (n >= 100) return ["🥉", "ブロンズ"];
  if (n >= 0) return ["🌱", "みならい飼育員"];
  return ["👻", "反転世界の住人"];
}

// 0除算クラッシュで画面に湧く文字（🐴多め＝トロイの木馬）
const GLITCH_POOL = "🐴🐴🐴🐴🐴🎠▓░÷0?！🐴🐴ヒヒーン🐴";
const TITLE_TEXT = "ゲートランナー";
const TITLE_COLORS = ["#ff5d8f", "#ff9f1c", "#ffd23f", "#4cd964", "#37b6ff", "#a06bff", "#ff7b54"];
const TITLE_FONT = "'Mochiy Pop One', 'Hiragino Maru Gothic ProN', 'ヒラギノ丸ゴ ProN W4', 'HG丸ｺﾞｼｯｸM-PRO', sans-serif";

// ===== 称号コレクション（全7種） =====
const TITLES = [
  { id: "overflow", icon: "🖥️", name: "限界突破エンジニア", hint: "2³² の壁を突破してみよう" },
  { id: "div0",     icon: "🐴", name: "宇宙を割った者",     hint: "0 で割ってみよう" },
  { id: "domain",   icon: "🌀", name: "虚数世界の迷子",     hint: "√ や log に入れちゃダメな数を…" },
  { id: "negative", icon: "👻", name: "反物質ブリーダー",   hint: "マイナスの数でクリアしよう" },
  { id: "zero",     icon: "🕳️", name: "虚無の飼育員",       hint: "ぴったり 0 匹でクリアしよう" },
  { id: "one",      icon: "🐺", name: "一匹狼マスター",     hint: "ぴったり 1 匹でクリアしよう" },
  { id: "giant",    icon: "🌌", name: "int32を超えし者",    hint: "2³¹（約21.5億）以上でクリアしよう" },
];

// ============================================================
//  localStorage 永続化（例外環境ではメモリ動作にフォールバック）
// ============================================================
const LS_BEST = "gateRunner.best";
const LS_TITLES = "gateRunner.titles";
function lsGet(key, fallback) {
  try {
    const v = window.localStorage.getItem(key);
    return v == null ? fallback : JSON.parse(v);
  } catch (e) { return fallback; }
}
function lsSet(key, val) {
  try { window.localStorage.setItem(key, JSON.stringify(val)); } catch (e) { /* メモリ動作にフォールバック */ }
}

// ============================================================
//  ゲーム状態
// ============================================================
const state = {
  phase: "start", // start|play|feedback|result|overflow|zerodiv
  count: START_N,
  stage: 0,
  pair: null,
  animal: "🐶",
  feedback: null,
  history: [],
  speed: SPEEDS[1],
  timeLeft: SPEEDS[1].time,
  crash: null,
  crashReady: false,
  spinner: "4294967296",
  best: (function () { const b = lsGet(LS_BEST, null); return typeof b === "number" ? b : null; })(),
  earnedTitles: (function () { const t = lsGet(LS_TITLES, []); return Array.isArray(t) ? t : []; })(),
  glitchChars: [],
};
let runEarned = []; // 今回のプレイで獲得した称号ID

// タイマー類
let tickTimer = null;
let fbTimer = null;
let crashReadyTimer = null;
let spinnerTimer = null;

function clearGameTimers() {
  clearInterval(tickTimer);
  clearTimeout(fbTimer);
  clearTimeout(crashReadyTimer);
  clearInterval(spinnerTimer);
}

// 称号を獲得（今回分の記録＋コレクションに追加＋保存）
function earnTitle(id) {
  if (!runEarned.includes(id)) runEarned.push(id);
  if (!state.earnedTitles.includes(id)) {
    state.earnedTitles = [...state.earnedTitles, id];
    lsSet(LS_TITLES, state.earnedTitles);
  }
}

// ============================================================
//  ゲーム進行
// ============================================================
function startGame() {
  clearGameTimers();
  runEarned = [];
  state.animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
  state.count = START_N;
  state.stage = 0;
  state.history = [];
  state.feedback = null;
  state.crash = null;
  state.crashReady = false;
  state.pair = makeGates(START_N, [], 0);
  state.timeLeft = state.speed.time;
  state.phase = "play";
  render();
  startTimer();
}

function goHome() {
  clearGameTimers();
  state.count = START_N;
  state.stage = 0;
  state.history = [];
  state.pair = null;
  state.feedback = null;
  state.crash = null;
  state.crashReady = false;
  state.phase = "start";
  render();
}

function startTimer() {
  clearInterval(tickTimer);
  state.timeLeft = state.speed.time;
  updateTimerDOM();
  tickTimer = setInterval(() => {
    if (state.phase !== "play") { clearInterval(tickTimer); return; }
    if (state.timeLeft <= 0.1) {
      clearInterval(tickTimer);
      state.timeLeft = 0;
      updateTimerDOM();
      // 時間切れ → 悪い方を自動選択
      doChoose(pickWorse(state.pair, state.count), true);
      return;
    }
    state.timeLeft = +(state.timeLeft - 0.1).toFixed(1);
    updateTimerDOM();
  }, 100);
}

function nextStage(nextCount, nextStageIdx, avoid) {
  if (nextStageIdx >= STAGE_COUNT) {
    // 特殊クリア称号の判定
    if (nextCount < 0) earnTitle("negative");
    if (nextCount === 0) earnTitle("zero");
    if (nextCount === 1) earnTitle("one");
    if (nextCount >= HALF_LIMIT) earnTitle("giant");
    if (state.best === null || nextCount > state.best) {
      state.best = nextCount;
      lsSet(LS_BEST, state.best);
    }
    state.phase = "result";
    render();
    return;
  }
  state.pair = makeGates(nextCount, avoid, nextStageIdx);
  state.stage = nextStageIdx;
  state.phase = "play";
  render();
  startTimer();
}

function doChoose(op, viaTimeout) {
  clearInterval(tickTimer);
  const prev = state.count;
  const res = evalOp(op, prev);

  if (res.type === "div0" || res.type === "nan") {
    earnTitle(res.type === "div0" ? "div0" : "domain");
    state.history = [...state.history, { stage: state.stage + 1, label: op.label, prev, crash: "zero", timeout: viaTimeout }];
    state.crash = { kind: res.type, label: op.label, prev };
    enterCrash("zerodiv");
    return;
  }
  if (res.type === "overflow") {
    earnTitle("overflow");
    state.history = [...state.history, { stage: state.stage + 1, label: op.label, prev, crash: "overflow", timeout: viaTimeout }];
    state.crash = { kind: "overflow", label: op.label, prev, sign: res.sign };
    enterCrash("overflow");
    return;
  }

  const next = res.value;
  state.history = [...state.history, { stage: state.stage + 1, label: op.label, prev, next, timeout: viaTimeout }];
  const avoid = [op.label, ...state.pair.map(p => p.label)];
  state.count = next;
  state.feedback = { diff: next - prev, label: op.label, prev, next };
  state.phase = "feedback";
  render();
  clearTimeout(fbTimer);
  fbTimer = setTimeout(() => {
    state.feedback = null;
    nextStage(next, state.stage + 1, avoid);
  }, 1000);
}

function choose(op) { if (state.phase === "play") doChoose(op, false); }

// クラッシュ演出開始（overflow / zerodiv 共通）
function enterCrash(kind) {
  state.phase = kind;
  state.crashReady = false;
  if (kind === "zerodiv") {
    const pool = Array.from(GLITCH_POOL); // 絵文字(サロゲートペア)対応
    state.glitchChars = Array.from({ length: 30 }, () => ({
      ch: pool[Math.floor(Math.random() * pool.length)],
      x: Math.random() * 90, y: Math.random() * 88,
      d: Math.random() * 1.4, s: 16 + Math.random() * 26, r: Math.random() * 60 - 30,
    }));
  }
  render();
  // 2.1秒後に結果画面へ（ゆっくり脈動 → 結果）
  clearTimeout(crashReadyTimer);
  crashReadyTimer = setTimeout(() => {
    state.crashReady = true;
    clearInterval(spinnerTimer);
    render();
  }, 2100);
  // オーバーフローの数字スロット演出
  clearInterval(spinnerTimer);
  if (kind === "overflow") {
    spinnerTimer = setInterval(() => {
      if (state.crashReady) { clearInterval(spinnerTimer); return; }
      let s = "";
      for (let i = 0; i < 10; i++) s += Math.floor(Math.random() * 10);
      state.spinner = s;
      const el = document.getElementById("spinner");
      if (el) el.textContent = s;
    }, 85);
  }
}

function animalGridHTML(count, animal) {
  const abs = Math.abs(count);
  const neg = count < 0;
  const display = Math.min(abs, 120);
  const size = abs > 60 ? 15 : abs > 30 ? 21 : 27;
  let spans = "";
  for (let i = 0; i < display; i++) {
    const delay = Math.min(i * 0.012, 1.2);
    spans += `<span style="font-size:${size}px;line-height:1;animation:pop 0.3s ease ${delay}s both;transform:${neg ? "scaleX(-1)" : "none"}">${animal}</span>`;
  }
  if (display === 0) spans = `<span style="font-size:32px;opacity:0.4">🕳️</span>`;
  return `<div style="position:relative;padding:6px;max-width:360px;margin:0 auto">
    ${neg ? `<div style="text-align:center;font-size:13px;color:#c62828;font-weight:700;margin-bottom:4px">👻 マイナス${fmt(abs)}匹（反転世界！）</div>` : ""}

}

    <div style="font-size:46px">🎊</div>
    <h3 style="margin:0 0 2px;font-size:21px">全ステージクリア！</h3>
    <p style="font-size:30px;font-weight:800;color:#7b1fa2;margin:6px 0 0;font-family:ui-monospace,Menlo,monospace;word-break:break-all">${state.animal} × ${fmt(count)}</p>
    ${unit ? `<div style="font-size:15px;color:#9c27b0;font-weight:700">（約${unit}匹！）</div>` : ""}
    <div style="display:inline-block;background:#f3e5f5;border:2px solid #ce93d8;border-radius:12px;padding:6px 18px;font-size:15px;font-weight:800;color:#6a1b9a;margin:10px 0 4px">${medal} ランク: ${title}</div>
    ${specialTitles}
    ${bestLine}
    ${animalGridHTML(count, state.animal)}
    ${historyHTML(state.history)}
    ${titleCollectionHTML(state.earnedTitles, runEarned, false)}
    <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
      <button data-action="replay" style="font-size:17px;padding:12px 34px;border-radius:14px;border:none;background:linear-gradient(135deg,#7b1fa2,#9c27b0);color:#fff;cursor:pointer;font-weight:800;box-shadow:0 4px 14px rgba(123,31,162,0.4)">もう一回！</button>
      <button data-action="home" style="font-size:17px;padding:12px 24px;border-radius:14px;border:3px solid #ce93d8;background:#fff;color:#6a1b9a;cursor:pointer;font-weight:800">🏠 ホームへ</button>
    </div>
  </div>`;
}

function render() {
  const crashing = (state.phase === "overflow" || state.phase === "zerodiv") && !state.crashReady;
  // 背景（bug結果画面のみブルースクリーン/暗転）
  app.style.background = state.phase === "zerodiv" && state.crashReady
    ? "#1b1b22"
    : state.phase === "overflow" && state.crashReady
      ? "#0067b8"
      : "linear-gradient(180deg, #f3e5f5 0%, #fff 100%)";
  app.style.animation = crashing ? "bigshake 0.25s linear infinite" : "none";

  let html = "";
  if (crashing) html += crashFrameHTML();
  if (crashing && state.phase === "zerodiv") html += glitchOverlayHTML();
  html += headerHTML();

  if (state.phase === "start") html += startHTML();
  else if (state.phase === "play" || state.phase === "feedback") html += playHTML();
  else if (state.phase === "overflow") html += state.crashReady ? overflowResultHTML() : overflowCrashHTML();
  else if (state.phase === "zerodiv") html += state.crashReady ? zerodivResultHTML() : zerodivCrashHTML();
  else if (state.phase === "result") html += resultHTML();

  app.innerHTML = html;
  bindEvents();
}

function bindEvents() {
  app.querySelectorAll("[data-action]").forEach(elm => {
    const action = elm.getAttribute("data-action");
    if (action === "start" || action === "replay") {
      elm.addEventListener("click", startGame);
    } else if (action === "home") {
      elm.addEventListener("click", goHome);
    } else if (action === "speed") {
      elm.addEventListener("click", () => {
        const key = elm.getAttribute("data-key");
        const s = SPEEDS.find(x => x.key === key);
        if (s) { state.speed = s; state.timeLeft = s.time; render(); }
      });
    } else if (action === "gate") {
      const i = +elm.getAttribute("data-i");
      elm.addEventListener("click", () => choose(state.pair[i]));
      elm.addEventListener("pointerdown", e => (e.currentTarget.style.transform = "scale(0.93)"));
      elm.addEventListener("pointerup", e => (e.currentTarget.style.transform = "scale(1)"));
      elm.addEventListener("pointerleave", e => (e.currentTarget.style.transform = "scale(1)"));
    }
  });
}

// 起動
render();
})();
</script>
